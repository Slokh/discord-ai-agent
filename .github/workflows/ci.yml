name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run lint
      - run: npm run typecheck
      - run: npx vitest run --coverage
      - run: npm audit --omit=dev
      - run: npm run build
      - run: npm run scan:release
      - uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: coverage/
          if-no-files-found: ignore
      - uses: azure/setup-helm@v4
      - run: helm lint deploy/helm/discord-ai-agent
      - run: helm template discord-ai-agent deploy/helm/discord-ai-agent >/tmp/discord-ai-agent.yaml
      - run: helm template discord-ai-agent deploy/helm/discord-ai-agent --set codegenWorker.enabled=true --set sandbox.cache.enabled=true --set codegenWorker.lease.acquireTimeoutSeconds=120 --set codegenWorker.lease.acquirePollSeconds=2 >/tmp/discord-ai-agent-codegen-worker.yaml
      - uses: hashicorp/setup-terraform@v4
      - run: terraform -chdir=deploy/terraform/aws fmt -check
      - run: terraform -chdir=deploy/terraform/aws init -backend=false
      - run: terraform -chdir=deploy/terraform/aws validate

  verify-db:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: discord_ai_agent
          POSTGRES_PASSWORD: discord_ai_agent
          POSTGRES_DB: discord_ai_agent
        ports:
          - 5433:5432
        options: >-
          --health-cmd "pg_isready -U discord_ai_agent -d discord_ai_agent"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run verify:db
