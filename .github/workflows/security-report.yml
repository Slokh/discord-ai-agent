name: Security Report

on:
  schedule:
    - cron: "23 10 * * 1"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: security-report
  cancel-in-progress: true

jobs:
  dependency-audit:
    name: Production dependency report
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v7
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Audit production dependencies at High severity
        continue-on-error: true
        run: npm audit --omit=dev --audit-level=high --json > npm-audit.json
      - name: Upload dependency report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: production-dependency-report
          path: npm-audit.json
          if-no-files-found: warn
          retention-days: 14

  container-report:
    name: Container vulnerability report
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Build runtime and codegen images
        run: |
          docker build --target final -t discord-ai-agent:report-runtime .
          docker build --target codegen -t discord-ai-agent:report-codegen .
      - name: Generate runtime SBOM
        uses: anchore/sbom-action@e22c389904149dbc22b58101806040fa8d37a610 # v0.24.0
        with:
          image: discord-ai-agent:report-runtime
          format: cyclonedx-json
          output-file: sbom-runtime.cdx.json
          upload-artifact: false
      - name: Generate codegen SBOM
        uses: anchore/sbom-action@e22c389904149dbc22b58101806040fa8d37a610 # v0.24.0
        with:
          image: discord-ai-agent:report-codegen
          format: cyclonedx-json
          output-file: sbom-codegen.cdx.json
          upload-artifact: false
      - name: Report runtime image findings at High severity
        uses: anchore/scan-action@e1165082ffb1fe366ebaf02d8526e7c4989ea9d2 # v7.4.0
        with:
          image: discord-ai-agent:report-runtime
          config: .grype.yaml
          fail-build: false
          severity-cutoff: high
          only-fixed: true
          output-file: grype-runtime.sarif
      - name: Report codegen image findings at High severity
        uses: anchore/scan-action@e1165082ffb1fe366ebaf02d8526e7c4989ea9d2 # v7.4.0
        with:
          image: discord-ai-agent:report-codegen
          config: .grype.yaml
          fail-build: false
          severity-cutoff: high
          only-fixed: true
          output-file: grype-codegen.sarif
      - name: Upload container reports
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: container-security-report
          path: |
            sbom-*.cdx.json
            grype-*.sarif
          if-no-files-found: warn
          retention-days: 14
