{{- if .Values.ciliumFqdnPolicy.enabled }}
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: {{ include "discord-ai-agent.fullname" . }}-sandbox-fqdn-egress
  labels:
    {{- include "discord-ai-agent.labels" . | nindent 4 }}
spec:
  endpointSelector:
    matchLabels:
      app.kubernetes.io/name: discord-ai-agent
      app.kubernetes.io/component: sandbox
  egress:
    - toEndpoints:
        - matchLabels:
            app.kubernetes.io/name: {{ include "discord-ai-agent.name" . }}
            app.kubernetes.io/instance: {{ .Release.Name }}
            app.kubernetes.io/component: api
      toPorts:
        - ports:
            - port: {{ .Values.api.port | quote }}
              protocol: TCP
    - toEndpoints:
        - matchLabels:
            k8s:io.kubernetes.pod.namespace: kube-system
            k8s:k8s-app: kube-dns
      toPorts:
        - ports:
            - port: "53"
              protocol: ANY
          rules:
            dns:
              - matchPattern: "*"
    - toFQDNs:
        {{- range .Values.ciliumFqdnPolicy.allowedHosts }}
        - matchName: {{ . | quote }}
        {{- end }}
      toPorts:
        - ports:
            - port: "443"
              protocol: TCP
{{- end }}
