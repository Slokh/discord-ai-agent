{{- if .Values.agentRuntime.warmSandbox.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "discord-ai-agent.fullname" . }}-agent-runtime
  labels:
    {{- include "discord-ai-agent.labels" . | nindent 4 }}
    app.kubernetes.io/component: agent-runtime
spec:
  replicas: {{ .Values.agentRuntime.warmSandbox.replicas }}
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ include "discord-ai-agent.name" . }}
      app.kubernetes.io/instance: {{ .Release.Name }}
      app.kubernetes.io/component: agent-runtime
  template:
    metadata:
      labels:
        {{- include "discord-ai-agent.labels" . | nindent 8 }}
        app.kubernetes.io/component: agent-runtime
    spec:
      serviceAccountName: {{ include "discord-ai-agent.fullname" . }}-app
      containers:
        - name: agent-runtime
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          command: ["node", "dist/src/agent/sandboxPromptServer.js"]
          ports:
            - name: http
              containerPort: {{ .Values.agentRuntime.warmSandbox.port }}
          readinessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 15
            periodSeconds: 20
          env:
            - name: DISCORD_AI_AGENT_PROCESS_ROLE
              value: worker
            {{- include "discord-ai-agent.commonEnv" . | nindent 12 }}
            {{- include "discord-ai-agent.databaseEnv" . | nindent 12 }}
            {{- include "discord-ai-agent.discordIdentityEnv" . | nindent 12 }}
            {{- include "discord-ai-agent.openRouterEnv" . | nindent 12 }}
            {{- include "discord-ai-agent.spotifyEnv" . | nindent 12 }}
            {{- include "discord-ai-agent.githubEnv" . | nindent 12 }}
            {{- include "discord-ai-agent.controlUiPublicEnv" . | nindent 12 }}
          resources:
            {{- toYaml .Values.agentRuntime.warmSandbox.resources | nindent 12 }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "discord-ai-agent.fullname" . }}-agent-runtime
  labels:
    {{- include "discord-ai-agent.labels" . | nindent 4 }}
    app.kubernetes.io/component: agent-runtime
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: {{ include "discord-ai-agent.name" . }}
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/component: agent-runtime
  ports:
    - name: http
      port: {{ .Values.agentRuntime.warmSandbox.port }}
      targetPort: http
{{- end }}
