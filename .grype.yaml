ignore:
  # gh 2.96.0 is the latest upstream release and embeds Go 1.26.4. Grype marks
  # GO-2026-4970 fixable at the Go toolchain level even though no patched gh
  # binary exists yet. Remove this exact-version exception when gh ships a
  # build using Go 1.26.5 or newer.
  - vulnerability: GO-2026-4970
    package:
      name: stdlib
      version: go1.26.4
      location: /usr/bin/gh
