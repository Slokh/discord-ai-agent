name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run lint
      - run: npm run typecheck
      - run: npx vitest run --coverage
      - run: npm run test:coverage:changed
      # Production dependency findings remain visible in the log, but only a
      # Critical advisory blocks a friend-scale release.
      - run: npm audit --omit=dev --audit-level=critical
      - run: npm run build
      - run: npx playwright install --with-deps chromium
      - run: npm run test:e2e
      - run: npm run scan:release
      - uses: actions/upload-artifact@v7
        with:
          name: coverage
          path: coverage/
          if-no-files-found: ignore
      - uses: azure/setup-helm@v5
      - run: helm lint deploy/helm/discord-ai-agent
      - run: helm template discord-ai-agent deploy/helm/discord-ai-agent >/tmp/discord-ai-agent.yaml
      - run: helm template discord-ai-agent deploy/helm/discord-ai-agent --set codegenWorker.enabled=true --set sandbox.cache.enabled=true --set codegenWorker.lease.acquireTimeoutSeconds=120 --set codegenWorker.lease.acquirePollSeconds=2 >/tmp/discord-ai-agent-codegen-worker.yaml
      # releases.hashicorp.com occasionally 502s; retry the download once.
      - uses: hashicorp/setup-terraform@v4
        id: setup_terraform
        continue-on-error: true
      - uses: hashicorp/setup-terraform@v4
        if: steps.setup_terraform.outcome == 'failure'
      - run: terraform -chdir=deploy/terraform/aws fmt -check
      - run: terraform -chdir=deploy/terraform/aws init -backend=false
      - run: terraform -chdir=deploy/terraform/aws validate

  verify-db:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: discord_ai_agent
          POSTGRES_PASSWORD: discord_ai_agent
          POSTGRES_DB: discord_ai_agent
        ports:
          - 5433:5432
        options: >-
          --health-cmd "pg_isready -U discord_ai_agent -d discord_ai_agent"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 20
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run migrate
      - run: npm run test:db:coverage
      - uses: actions/upload-artifact@v7
        with:
          name: coverage-db
          path: coverage-db/

  container-security:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Build runtime and codegen images
        run: |
          docker build --target final -t discord-ai-agent:ci-runtime .
          docker build --target codegen -t discord-ai-agent:ci-codegen .
      - name: Generate runtime SBOM
        uses: anchore/sbom-action@e22c389904149dbc22b58101806040fa8d37a610 # v0.24.0
        with:
          image: discord-ai-agent:ci-runtime
          format: cyclonedx-json
          output-file: sbom-runtime.cdx.json
          upload-artifact: false
      - name: Generate codegen SBOM
        uses: anchore/sbom-action@e22c389904149dbc22b58101806040fa8d37a610 # v0.24.0
        with:
          image: discord-ai-agent:ci-codegen
          format: cyclonedx-json
          output-file: sbom-codegen.cdx.json
          upload-artifact: false
      - uses: actions/upload-artifact@v7
        with:
          name: container-sboms
          path: sbom-*.cdx.json
      - name: Scan runtime image
        uses: anchore/scan-action@e1165082ffb1fe366ebaf02d8526e7c4989ea9d2 # v7.4.0
        with:
          image: discord-ai-agent:ci-runtime
          config: .grype.yaml
          fail-build: true
          severity-cutoff: critical
          only-fixed: true
          output-file: grype-runtime.sarif
      - name: Scan codegen image
        uses: anchore/scan-action@e1165082ffb1fe366ebaf02d8526e7c4989ea9d2 # v7.4.0
        with:
          image: discord-ai-agent:ci-codegen
          config: .grype.yaml
          fail-build: true
          severity-cutoff: critical
          only-fixed: true
          output-file: grype-codegen.sarif
      - name: Upload container scan reports
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: container-scan-reports
          path: grype-*.sarif
          if-no-files-found: warn
