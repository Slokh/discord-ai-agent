image:
  repository: ghcr.io/owner/discord-ai-agent
  tag: latest
  pullPolicy: IfNotPresent

sandbox:
  image: ghcr.io/owner/discord-ai-agent-sandbox:latest
  imagePullPolicy: IfNotPresent
  serviceAccountName: discord-ai-agent-sandbox
  resources:
    requests:
      cpu: 500m
      memory: 512Mi
    limits:
      cpu: "2"
      memory: 2Gi
  taskTimeoutSeconds: 1800
  ttlSecondsAfterFinished: 3600
  cache:
    enabled: false
    mountPath: /var/cache/discord-ai-agent
    size: 20Gi
    accessModes:
      - ReadWriteOnce
    storageClassName: ""

codegen:
  # kubernetes-job keeps one isolated Kubernetes Job per code update.
  # Prefer codegenWorker.enabled=true for warm local-process codegen so normal
  # worker queues stay separate from code execution.
  executionBackend: kubernetes-job
  # codex uses the Codex app-server harness. opencode uses OpenCode serve + run
  # while keeping the rest of the sandbox, verification, and PR flow unchanged.
  harness: opencode

agentRuntime:
  # in-process keeps the current compatibility model loop in the worker.
  # warm-sandbox dispatches Discord prompt execution to a warm prompt server
  # when warmSandbox.enabled=true, with local child-process fallback otherwise.
  executionBackend: in-process
  warmSandbox:
    enabled: false
    replicas: 1
    port: 8090
    resources: {}

secret:
  existingSecretName: discord-ai-agent-env

config:
  botName: ai
  githubRepository: owner/repo
  githubBaseBranch: main
  openRouterChatModel: z-ai/glm-5.2
  # Optional. Defaults to openRouterChatModel when empty.
  openRouterCodegenModel: z-ai/glm-5.2
  openRouterEmbeddingModel: qwen/qwen3-embedding-8b
  openRouterImageModel: google/gemini-3.1-flash-image
  embeddingDimensions: "1536"
  discordAgentResponseTimeoutMs: "1800000"
  databaseUrlSecretKey: DATABASE_URL
  discordTokenSecretKey: DISCORD_TOKEN
  discordClientIdSecretKey: DISCORD_CLIENT_ID
  discordGuildIdSecretKey: DISCORD_GUILD_ID
  openRouterApiKeySecretKey: OPENROUTER_API_KEY
  spotifyClientIdSecretKey: SPOTIFY_CLIENT_ID
  spotifyClientSecretKey: SPOTIFY_CLIENT_SECRET
  githubTokenSecretKey: GITHUB_TOKEN
  githubAppIdSecretKey: GITHUB_APP_ID
  githubAppPrivateKeySecretKey: GITHUB_APP_PRIVATE_KEY
  githubAppInstallationIdSecretKey: GITHUB_APP_INSTALLATION_ID
  taskSigningSecretKey: TASK_SIGNING_SECRET
  controlUiAuthPasswordSecretKey: CONTROL_UI_AUTH_PASSWORD
  controlUiPublicUrl: ""

api:
  replicas: 1
  port: 8080
  service:
    type: ClusterIP
  publicService:
    enabled: false
    type: LoadBalancer
    annotations: {}
    port: 443
  metrics:
    scrapeAnnotations: true
  resources: {}

bot:
  replicas: 1
  terminationGracePeriodSeconds: 120
  resources: {}

worker:
  # Keep this at 1 with the default ReadWriteOnce sandbox cache PVC. Use RWX
  # storage or a DB-backed cache/sandbox lease model before scaling codegen workers.
  replicas: 1
  terminationGracePeriodSeconds: 120
  queues:
    crawl: true
    embedding: true
    task: true
    discordAgent: true
  resources: {}

codegenWorker:
  # Optional dedicated warm codegen worker pool. When enabled, this Deployment
  # runs only the agent.task queue with local-process warm execution and the
  # regular worker stops consuming task jobs.
  enabled: false
  replicas: 1
  terminationGracePeriodSeconds: 120
  executionBackend: local-process
  lease:
    heartbeatSeconds: 15
    staleSeconds: 120
    acquireTimeoutSeconds: 1800
    acquirePollSeconds: 5
  resources: {}

migrations:
  enabled: true

networkPolicy:
  enabled: true
  allowSandboxInternetEgress: true

ciliumFqdnPolicy:
  enabled: false
  allowedHosts:
    - github.com
    - api.github.com
    - codeload.github.com
    - objects.githubusercontent.com
    - openrouter.ai
    - registry.npmjs.org
