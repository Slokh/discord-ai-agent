name: Deploy EKS

on:
  workflow_run:
    workflows:
      - CI
    types:
      - completed
    branches:
      - main

permissions:
  contents: read
  id-token: write

jobs:
  deploy-eks:
    if: github.event.workflow_run.conclusion == 'success' && github.event.workflow_run.event == 'push' && vars.AWS_REGION != '' && vars.EKS_CLUSTER_NAME != '' && vars.ECR_REPOSITORY != ''
    runs-on: ubuntu-latest
    env:
      AWS_REGION: ${{ vars.AWS_REGION }}
      EKS_CLUSTER_NAME: ${{ vars.EKS_CLUSTER_NAME }}
      ECR_REPOSITORY: ${{ vars.ECR_REPOSITORY }}
      HELM_RELEASE: ${{ vars.HELM_RELEASE || 'discord-ai-agent' }}
      K8S_NAMESPACE: ${{ vars.K8S_NAMESPACE || 'discord-ai-agent' }}
      API_SERVICE_TYPE: ${{ vars.API_SERVICE_TYPE }}
      API_TLS_CERTIFICATE_ARN: ${{ vars.API_TLS_CERTIFICATE_ARN }}
      CONTROL_UI_PUBLIC_URL: ${{ vars.CONTROL_UI_PUBLIC_URL }}
      RELEASE_NOTES_CHANNEL_ID: ${{ vars.RELEASE_NOTES_CHANNEL_ID }}
      # Repo the bot opens code-update PRs against; defaults to this repo.
      CODE_UPDATE_REPOSITORY: ${{ vars.CODE_UPDATE_REPOSITORY || github.repository }}
      CODEGEN_WORKER_ENABLED: ${{ vars.CODEGEN_WORKER_ENABLED }}
      CODEGEN_WORKER_REPLICAS: ${{ vars.CODEGEN_WORKER_REPLICAS }}
      CODEGEN_LEASE_HEARTBEAT_SECONDS: ${{ vars.CODEGEN_LEASE_HEARTBEAT_SECONDS }}
      CODEGEN_LEASE_STALE_SECONDS: ${{ vars.CODEGEN_LEASE_STALE_SECONDS }}
      CODEGEN_LEASE_ACQUIRE_TIMEOUT_SECONDS: ${{ vars.CODEGEN_LEASE_ACQUIRE_TIMEOUT_SECONDS }}
      CODEGEN_LEASE_ACQUIRE_POLL_SECONDS: ${{ vars.CODEGEN_LEASE_ACQUIRE_POLL_SECONDS }}
      BUDGET_USER_TURNS_PER_DAY: ${{ vars.BUDGET_USER_TURNS_PER_DAY }}
      BUDGET_USER_IMAGES_PER_DAY: ${{ vars.BUDGET_USER_IMAGES_PER_DAY }}
      BUDGET_USER_CODEGEN_PER_DAY: ${{ vars.BUDGET_USER_CODEGEN_PER_DAY }}
      BUDGET_GUILD_DAILY_USD: ${{ vars.BUDGET_GUILD_DAILY_USD }}
      WALLET_ENABLED: ${{ vars.WALLET_ENABLED }}
      USER_WALLETS_ENABLED: ${{ vars.USER_WALLETS_ENABLED }}
      WALLET_BALANCES_PUBLIC: ${{ vars.WALLET_BALANCES_PUBLIC }}
      TEMPO_NETWORK: ${{ vars.TEMPO_NETWORK }}
      TEMPO_USD_TOKEN: ${{ vars.TEMPO_USD_TOKEN }}
      WALLET_INITIAL_GRANT_USD: ${{ vars.WALLET_INITIAL_GRANT_USD }}
      WALLET_MAX_GAME_SETTLEMENT_USD: ${{ vars.WALLET_MAX_GAME_SETTLEMENT_USD }}
      SANDBOX_CACHE_ENABLED: ${{ vars.SANDBOX_CACHE_ENABLED }}
      SANDBOX_CACHE_SIZE: ${{ vars.SANDBOX_CACHE_SIZE }}
      SANDBOX_CACHE_STORAGE_CLASS: ${{ vars.SANDBOX_CACHE_STORAGE_CLASS }}
      IMAGE_TAG: ${{ github.event.workflow_run.head_sha }}
    steps:
      - uses: actions/checkout@v7
        with:
          ref: ${{ github.event.workflow_run.head_sha }}
      - uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}
      - id: ecr
        uses: aws-actions/amazon-ecr-login@v2
      - uses: azure/setup-helm@v4
      - name: Build and push images
        env:
          REGISTRY: ${{ steps.ecr.outputs.registry }}
        run: |
          docker build --target final -t "$REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG" .
          docker push "$REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG"
          docker build --target codegen -t "$REGISTRY/$ECR_REPOSITORY-sandbox:$IMAGE_TAG" .
          docker push "$REGISTRY/$ECR_REPOSITORY-sandbox:$IMAGE_TAG"
      - name: Deploy Helm chart
        env:
          REGISTRY: ${{ steps.ecr.outputs.registry }}
        run: |
          aws eks update-kubeconfig --region "$AWS_REGION" --name "$EKS_CLUSTER_NAME"
          previous_app_revision=""
          if kubectl --namespace "$K8S_NAMESPACE" get deployment "$HELM_RELEASE-bot" >/dev/null 2>&1; then
            previous_app_revision="$(kubectl --namespace "$K8S_NAMESPACE" get deployment "$HELM_RELEASE-bot" -o jsonpath='{.spec.template.spec.containers[?(@.name=="bot")].env[?(@.name=="APP_REVISION")].value}')"
          fi
          helm_args=(
            --namespace "$K8S_NAMESPACE"
            --create-namespace
            --set "image.repository=$REGISTRY/$ECR_REPOSITORY"
            --set "image.tag=$IMAGE_TAG"
            --set "sandbox.image=$REGISTRY/$ECR_REPOSITORY-sandbox:$IMAGE_TAG"
            --set-string "config.appRevision=$IMAGE_TAG"
            --set "config.githubRepository=$CODE_UPDATE_REPOSITORY"
          )
          if [ -n "$previous_app_revision" ]; then
            helm_args+=(--set-string "config.previousAppRevision=$previous_app_revision")
          fi
          if [ -n "${RELEASE_NOTES_CHANNEL_ID:-}" ]; then
            helm_args+=(--set-string "config.releaseNotesChannelId=$RELEASE_NOTES_CHANNEL_ID")
          fi
          if [ -n "${API_SERVICE_TYPE:-}" ]; then
            helm_args+=(--set "api.publicService.type=$API_SERVICE_TYPE")
          fi
          if [ -n "${API_TLS_CERTIFICATE_ARN:-}" ]; then
            helm_args+=(
              --set "api.publicService.enabled=true"
              --set-string "api.publicService.annotations.service\\.beta\\.kubernetes\\.io/aws-load-balancer-ssl-cert=$API_TLS_CERTIFICATE_ARN"
              --set-string "api.publicService.annotations.service\\.beta\\.kubernetes\\.io/aws-load-balancer-ssl-ports=https"
              --set-string "api.publicService.annotations.service\\.beta\\.kubernetes\\.io/aws-load-balancer-backend-protocol=http"
            )
          fi
          if [ -n "${CONTROL_UI_PUBLIC_URL:-}" ]; then
            helm_args+=(--set-string "config.controlUiPublicUrl=$CONTROL_UI_PUBLIC_URL")
          fi
          is_true() {
            case "${1:-}" in
              1|true|TRUE|yes|YES|on|ON) return 0 ;;
              *) return 1 ;;
            esac
          }
          if is_true "$CODEGEN_WORKER_ENABLED"; then
            helm_args+=(--set "codegenWorker.enabled=true")
          fi
          if [ -n "${CODEGEN_WORKER_REPLICAS:-}" ]; then
            helm_args+=(--set "codegenWorker.replicas=$CODEGEN_WORKER_REPLICAS")
          fi
          if [ -n "${CODEGEN_LEASE_HEARTBEAT_SECONDS:-}" ]; then
            helm_args+=(--set "codegenWorker.lease.heartbeatSeconds=$CODEGEN_LEASE_HEARTBEAT_SECONDS")
          fi
          if [ -n "${CODEGEN_LEASE_STALE_SECONDS:-}" ]; then
            helm_args+=(--set "codegenWorker.lease.staleSeconds=$CODEGEN_LEASE_STALE_SECONDS")
          fi
          if [ -n "${CODEGEN_LEASE_ACQUIRE_TIMEOUT_SECONDS:-}" ]; then
            helm_args+=(--set "codegenWorker.lease.acquireTimeoutSeconds=$CODEGEN_LEASE_ACQUIRE_TIMEOUT_SECONDS")
          fi
          if [ -n "${CODEGEN_LEASE_ACQUIRE_POLL_SECONDS:-}" ]; then
            helm_args+=(--set "codegenWorker.lease.acquirePollSeconds=$CODEGEN_LEASE_ACQUIRE_POLL_SECONDS")
          fi
          if [ -n "${BUDGET_USER_TURNS_PER_DAY:-}" ]; then
            helm_args+=(--set-string "config.budgetUserTurnsPerDay=$BUDGET_USER_TURNS_PER_DAY")
          fi
          if [ -n "${BUDGET_USER_IMAGES_PER_DAY:-}" ]; then
            helm_args+=(--set-string "config.budgetUserImagesPerDay=$BUDGET_USER_IMAGES_PER_DAY")
          fi
          if [ -n "${BUDGET_USER_CODEGEN_PER_DAY:-}" ]; then
            helm_args+=(--set-string "config.budgetUserCodegenPerDay=$BUDGET_USER_CODEGEN_PER_DAY")
          fi
          if [ -n "${BUDGET_GUILD_DAILY_USD:-}" ]; then
            helm_args+=(--set-string "config.budgetGuildDailyUsd=$BUDGET_GUILD_DAILY_USD")
          fi
          if [ -n "${WALLET_ENABLED:-}" ]; then
            helm_args+=(--set-string "config.walletEnabled=$WALLET_ENABLED")
          fi
          if [ -n "${USER_WALLETS_ENABLED:-}" ]; then
            helm_args+=(--set-string "config.userWalletsEnabled=$USER_WALLETS_ENABLED")
          fi
          if [ -n "${WALLET_BALANCES_PUBLIC:-}" ]; then
            helm_args+=(--set-string "config.walletBalancesPublic=$WALLET_BALANCES_PUBLIC")
          fi
          if [ -n "${TEMPO_NETWORK:-}" ]; then
            helm_args+=(--set-string "config.tempoNetwork=$TEMPO_NETWORK")
          fi
          if [ -n "${TEMPO_USD_TOKEN:-}" ]; then
            helm_args+=(--set-string "config.tempoUsdToken=$TEMPO_USD_TOKEN")
          fi
          if [ -n "${WALLET_INITIAL_GRANT_USD:-}" ]; then
            helm_args+=(--set-string "config.walletInitialGrantUsd=$WALLET_INITIAL_GRANT_USD")
          fi
          if [ -n "${WALLET_MAX_GAME_SETTLEMENT_USD:-}" ]; then
            helm_args+=(--set-string "config.walletMaxGameSettlementUsd=$WALLET_MAX_GAME_SETTLEMENT_USD")
          fi
          if is_true "$SANDBOX_CACHE_ENABLED"; then
            helm_args+=(--set "sandbox.cache.enabled=true")
          fi
          if [ -n "${SANDBOX_CACHE_SIZE:-}" ]; then
            helm_args+=(--set-string "sandbox.cache.size=$SANDBOX_CACHE_SIZE")
          fi
          if [ -n "${SANDBOX_CACHE_STORAGE_CLASS:-}" ]; then
            helm_args+=(--set-string "sandbox.cache.storageClassName=$SANDBOX_CACHE_STORAGE_CLASS")
          fi
          helm upgrade --install "$HELM_RELEASE" deploy/helm/discord-ai-agent \
            "${helm_args[@]}"
