apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: {{ include "discord-ai-agent.fullname" . }}-sandbox-launcher
  labels:
    {{- include "discord-ai-agent.labels" . | nindent 4 }}
rules:
  - apiGroups: [""]
    resources: ["secrets", "configmaps"]
    verbs: ["create", "get", "update", "delete"]
  - apiGroups: ["batch"]
    resources: ["jobs"]
    verbs: ["create", "get", "list", "watch", "delete"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ include "discord-ai-agent.fullname" . }}-sandbox-launcher
  labels:
    {{- include "discord-ai-agent.labels" . | nindent 4 }}
subjects:
  - kind: ServiceAccount
    name: {{ include "discord-ai-agent.fullname" . }}-worker
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: {{ include "discord-ai-agent.fullname" . }}-sandbox-launcher
