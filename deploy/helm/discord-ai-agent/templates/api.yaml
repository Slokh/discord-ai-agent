apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "discord-ai-agent.fullname" . }}-api
  labels:
    {{- include "discord-ai-agent.labels" . | nindent 4 }}
    app.kubernetes.io/component: api
spec:
  replicas: {{ .Values.api.replicas }}
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ include "discord-ai-agent.name" . }}
      app.kubernetes.io/instance: {{ .Release.Name }}
      app.kubernetes.io/component: api
  template:
    metadata:
      {{- if .Values.api.metrics.scrapeAnnotations }}
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/path: /metrics
        prometheus.io/port: {{ .Values.api.port | quote }}
      {{- end }}
      labels:
        {{- include "discord-ai-agent.labels" . | nindent 8 }}
        app.kubernetes.io/component: api
    spec:
      serviceAccountName: {{ include "discord-ai-agent.fullname" . }}-app
      containers:
        - name: api
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          command: ["node", "dist/src/index.js", "api"]
          ports:
            - name: http
              containerPort: {{ .Values.api.port }}
          readinessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 15
            periodSeconds: 20
          env:
            - name: DISCORD_AI_AGENT_PROCESS_ROLE
              value: api
            {{- include "discord-ai-agent.runtimeMigrationEnv" . | nindent 12 }}
            {{- include "discord-ai-agent.databaseEnv" . | nindent 12 }}
            {{- include "discord-ai-agent.internalApiEnv" . | nindent 12 }}
          resources:
            {{- toYaml .Values.api.resources | nindent 12 }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "discord-ai-agent.fullname" . }}-api
  labels:
    {{- include "discord-ai-agent.labels" . | nindent 4 }}
    app.kubernetes.io/component: api
  {{- if .Values.api.metrics.scrapeAnnotations }}
  annotations:
    prometheus.io/scrape: "true"
    prometheus.io/path: /metrics
    prometheus.io/port: {{ .Values.api.port | quote }}
  {{- end }}
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: {{ include "discord-ai-agent.name" . }}
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/component: api
  ports:
    - name: http
      port: {{ .Values.api.port }}
      targetPort: http
